<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Generic article</title>
  <style>
    body { margin: 0; font: 17px/1.65 Georgia, serif; color: #28251f; background: #fffdf8; }
    main { width: min(760px, calc(100% - 32px)); margin: 48px auto; }
    .eyebrow { color: #875f20; font: 700 12px/1 system-ui; letter-spacing: .14em; text-transform: uppercase; }
    h1 { max-width: 16ch; font-size: clamp(36px, 7vw, 68px); line-height: 1.02; }
    blockquote { margin: 32px 0; padding-left: 20px; border-left: 4px solid #d8a84e; }
    .facts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .facts div { padding: 16px; background: #f5ead5; border-radius: 10px; }
    @media (max-width: 520px) {
      main { margin-top: 24px; }
      .facts { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root">
  <main>
    <p class="eyebrow">Field notes</p>
    <h1>A quiet guide to coastal light</h1>
    <p>Morning haze softens every edge before the tide turns.</p>
    <blockquote>Watch the horizon, not the clock.</blockquote>
    <section class="facts" aria-label="Trip facts">
      <div><strong>Distance</strong><br>8 kilometers</div>
      <div><strong>Season</strong><br>Early autumn</div>
    </section>
  </main>
  </div>
</body>
</html>
