name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: |
          node -e "require('fs').mkdirSync('target/release-gate/runtime',{recursive:true})"
          npm install --prefix target/release-gate/runtime --save-exact --ignore-scripts --no-audit --no-fund vite@8.1.2 react@19.2.0 react-dom@19.2.0
      - run: cargo test --all-targets --locked
        env:
          RECREATE_BROWSER: /usr/bin/google-chrome
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence
          path: target/release-gate/evidence.json
          if-no-files-found: error
