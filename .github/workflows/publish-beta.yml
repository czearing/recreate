name: Publish beta

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-beta
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run ci
      - id: version
        run: npm run version:beta
      - run: npm install --global npm@latest
      - run: npm publish --tag beta --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: echo "Published recreate-cli@${{ steps.version.outputs.version }}"
