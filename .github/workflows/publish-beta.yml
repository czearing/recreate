name: Publish beta

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-beta
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@czearing"
      - run: npm ci
      - run: npm run ci
      - id: version
        run: npm run version:beta
      - run: npm publish --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "Published @czearing/recreate@${{ steps.version.outputs.version }}"
