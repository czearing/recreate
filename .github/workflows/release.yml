name: Publish main binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            source: target/release/recreate
            asset: recreate-linux-x86_64
          - os: windows-latest
            source: target/release/recreate.exe
            asset: recreate-windows-x86_64.exe
          - os: macos-13
            source: target/release/recreate
            asset: recreate-macos-x86_64
          - os: macos-14
            source: target/release/recreate
            asset: recreate-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets
      - run: cargo build --release
      - shell: bash
        run: cp "${{ matrix.source }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view recreate-main --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create recreate-main --repo "$GITHUB_REPOSITORY" \
              --prerelease --title "Recreate main" \
              --notes "Latest validated main build."
          gh release upload recreate-main --repo "$GITHUB_REPOSITORY" \
            artifacts/* --clobber
