name: Publish main binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            source: target/release/recreate
            asset: recreate-linux-x86_64
            browser: /usr/bin/google-chrome
          - os: windows-latest
            source: target/release/recreate.exe
            asset: recreate-windows-x86_64.exe
            browser: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
          - os: macos-15
            source: target/release/recreate
            asset: recreate-macos-aarch64
            browser: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --all-targets --locked
        env:
          RECREATE_BROWSER: ${{ matrix.browser }}
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence-${{ matrix.asset }}
          path: target/release-gate/evidence.json
          if-no-files-found: error
      - shell: bash
        run: cp "${{ matrix.source }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: recreate-*
          path: artifacts
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view recreate-main --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create recreate-main --repo "$GITHUB_REPOSITORY" \
              --prerelease --title "Recreate main" \
              --notes "Latest validated main build."
          gh release upload recreate-main --repo "$GITHUB_REPOSITORY" \
            artifacts/* --clobber
