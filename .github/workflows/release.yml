name: Stable release

on:
  push:
    branches: [main]

concurrency:
  group: stable-release
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          branch="$(printf '%s' "$RELEASE_PR" | jq -r '.headBranchName // empty')"
          test -n "$branch"
          sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$branch" --jq '.object.sha')"
          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
          run_id=""
          for _ in {1..15}; do
            run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow ci.yml \
              --event workflow_dispatch --commit "$sha" --limit 1 \
              --json databaseId --jq '.[0].databaseId // empty')"
            [ -n "$run_id" ] && break
            sleep 2
          done
          test -n "$run_id"
          gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag_name }}
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@czearing"
      - if: ${{ steps.release.outputs.release_created }}
        run: npm ci
      - if: ${{ steps.release.outputs.release_created }}
        run: npm run ci
      - if: ${{ steps.release.outputs.release_created }}
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
